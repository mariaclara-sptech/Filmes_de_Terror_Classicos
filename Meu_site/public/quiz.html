<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Vintage Frights | Quiz</title>

<link rel="stylesheet" href="css/quiz.css">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display&display=swap" rel="stylesheet">
</head>

<body>

<div class="menu">
    <div class="logo">VINTAGE FRIGHTS</div>

    <div class="botoes">
        <a href="index.html"><span>Início</span></a>
        <a href="#"><span>Quiz</span></a>
        <a href="filmes.html"><span>Filmes</span></a>
        <a href="linha.html"><span>Linha do Tempo</span></a>
    </div>
</div>

<div class="quiz-container">
    <div class="quiz-box">


        <div id="pergunta"></div>
<div id="descricao"></div>
<div id="opcoes">
    <button onclick="selecionar(0)" id="op0"></button><br>
    <button onclick="selecionar(1)" id="op1"></button><br>
    <button onclick="selecionar(2)" id="op2"></button><br>
    <button onclick="selecionar(3)" id="op3"></button><br>
</div>


<button id="btnProx" onclick="proxima()">PRÓXIMA</button>
<button id="btnReiniciar" onclick="reiniciar()" hidden>REINICIAR</button>

        <div id="resultado" class="resultado"></div>

    </div>
</div>
<div class="rodape">
    <h2 class="titulo-rodape">VINTAGE FRIGHTS</h2>

    <p class="frase-rodape">
        “O medo nunca envelhece… ele evolui.”
    </p>

    <div class="info-rodape">
        <p>DIREÇÃO: MARIA CLARA | ANO: 2026</p>
        <p>VINTAGE FRIGHTS © PROJETO INDIVIDUAL SPTECH</p>
    </div>
</div>

<script>

const perguntas = [

{
pergunta: `<p style="font-family: 'Cinzel';">Você está sozinho(a) em casa à noite. O telefone toca. Uma voz calma começa a fazer perguntas aparentemente inofensivas sobre filmes de terror… até que ela revela detalhes da sua rotina que ninguém deveria saber.<br> A voz diz:<br>Você gosta de jogos? Porque eu adoro jogos… principalmente quando as regras não são tão claras.</p>`,
descricao: "<br>Você percebe que alguém pode estar te observando de fora da casa. <br>O que você faz?<br><br>",
opcoes: [
"Entra no jogo, tentando ganhar tempo e descobrir quem é",
"Desliga imediatamente e vai verificar portas e janelas",
"Liga para a polícia enquanto permanece em silêncio",
"Sai da casa discretamente pelos fundos sem fazer barulho"
],
pontos: [1,2,4,3]
},

{
pergunta: `<p style="font-family: 'Cinzel';">Você está em uma casa onde algo parece… errado. As portas estão abertas, luzes piscam ocasionalmente, e há uma sensação constante de que alguém está observando.<br>Você encontra uma faca na cozinha e percebe que não tem sinal de celular.`,
descricao: "<br>Ao subir as escadas, você ouve passos lentos no andar de cima.<br>Qual sua decisão?<br><br>",
opcoes: [
"Subir silenciosamente e tentar surpreender quem estiver lá",
"Sair da casa imediatamente pela porta da frente",
"Se esconder e observar antes de agir",
"Se armar e fazer barulho proposital para atrair a pessoa"
],
pontos: [1,4,3,2]
},

{
pergunta: `<p style="font-family: 'Cinzel';">Você e seus amigos estão perdidos em uma floresta. A bússola não funciona, o mapa parece errado e vocês começam a encontrar símbolos estranhos pendurados nas árvores.<br>Durante a noite, sons de galhos quebrando e passos cercam o acampamento.`,
descricao: "<br>De manhã, um dos seus amigos desapareceu.<br>O grupo entra em pânico.<br>Você:<br><br>",
opcoes: [
"Tenta manter o grupo unido e continuar andando",
"Decide voltar pelo caminho que acredita ter vindo",
"Analisa o ambiente antes de qualquer movimento",
"Se separa do grupo para procurar ajuda mais rápido"
],
pontos: [2,1,4,0]
},

{
pergunta: `<p style="font-family: 'Cinzel';">Você percebe que alguém está eliminando pessoas ao seu redor, uma por uma.<br>Você vê ao longe uma figura alta, imóvel, observando.<br>Não há polícia, não há ajuda — apenas você e o ambiente ao redor.`,
descricao: "<br>Você tem acesso a: <br>Uma faca<br>Uma lanterna<br>Um carro (sem chave à vista)<br><br>",
opcoes: [
"Tenta fugir a pé imediatamente",
"Se esconde e observa o padrão do assassino",
"Procura a chave do carro rapidamente",
"Tenta confrontar o assassino com a faca"
],
pontos: [2,4,3,0]
},

{
pergunta: `<p style="font-family: 'Cinzel';">Você está em uma casa onde objetos se movem sozinhos, portas batem e vozes sussurram.<br>Você descobre que existe uma entidade ligada a um objeto específico da casa.`,
descricao: "<br>À noite, ela se manifesta com mais força.<br>Você:<br><br>",
opcoes: [
"Sai da casa imediatamente",
"Procura o objeto para destruí-lo",
"Permanece e tenta entender o padrão da entidade",
"Dorme e ignora para manter a calma"
],
pontos: [0,4,1,3]
},
{
pergunta: `<p style="font-family: 'Cinzel';">Você conseguiu sobreviver até o fim.<br>O assassino está aparentemente derrotado… no chão.`,
descricao: "<br>O que você faz?<br><br>",
opcoes: [
"Vai embora imediatamente",
"Verifica se ele está realmente morto",
"Ataca novamente para garantir",
"Fica parado observando por alguns segundos"
],
pontos: [3,4,2,0]
}

];

let atual = 0
let pontuacao = 0
let escolhido = -1

function carregar() {

    let questao = perguntas[atual]

    pergunta.innerHTML = questao.pergunta
    descricao.innerHTML = questao.descricao

    escolhido = -1

    op0.innerHTML = questao.opcoes[0]
    op1.innerHTML = questao.opcoes[1]
    op2.innerHTML = questao.opcoes[2]
    op3.innerHTML = questao.opcoes[3]
}

function selecionar(selecione){
    escolhido = selecione
}

function proxima() {

    if (escolhido == -1) {
        alert("Escolha uma opção!")
        return
    }

    pontuacao += perguntas[atual].pontos[escolhido]

    atual++

    if (atual < perguntas.length) {
        carregar()
    } else {
        finalizar()
    }
}

function reiniciar(){
    atual = 0
    pontuacao = 0

    resultado.innerHTML = ""

    btnReiniciar.hidden = true
    btnProx.hidden = false

    carregar()
}

function finalizar(){

    let max = perguntas.length * 4
    let porcentagem = (pontuacao / max) * 100

    resultado.innerHTML = "Pontuação: " + pontuacao + "<br>"
    resultado.innerHTML += porcentagem.toFixed(0) + "%<br><br>"

    if(pontuacao <= 8){
        resultado.innerHTML += "Você não dura muito..."
    } 
    else if(pontuacao <= 16){
        resultado.innerHTML += "Você resiste por um tempo..."
    } 
    else if(pontuacao <= 20){
        resultado.innerHTML += "Você sobrevive."
    } 
    else {
        resultado.innerHTML += "Você domina o terror."
    }

    op0.innerHTML = ""
    op1.innerHTML = ""
    op2.innerHTML = ""
    op3.innerHTML = ""

    pergunta.innerHTML = ""
    descricao.innerHTML = ""

    btnProx.hidden = true
    btnReiniciar.hidden = false

    let idUsuario = sessionStorage.ID_USUARIO;

    fetch("http://localhost:3333/quiz/registrar", {
    method: "POST",
    headers: {
        "Content-Type": "application/json"
    },
    body: JSON.stringify({
        idUsuarioServer: idUsuario,
        pontuacaoServer: pontuacao
    })
})
.then(res => {
    if (!res.ok) {
        console.log("Erro ao salvar")
    }
})
.catch(err => {
    console.log(err)
})

    
}
carregar()
</script>

</body>
</html>
