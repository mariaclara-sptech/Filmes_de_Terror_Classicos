<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Vintage Frights | Buscar</title>

    <link rel="stylesheet" href="./css/detalhes.css">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display&display=swap" rel="stylesheet">
</head>

<body onload="carregar()">


<div class="menu">
    <div class="logo">VINTAGE FRIGHTS</div>

    <div class="botoes">
        <a href="index.html"><span>Início</span></a>
        <a href="quiz.html"><span>Quiz</span></a>
        <a href="filmes.html"><span>Filmes</span></a>
        <a href="linha.html"><span>Linha do Tempo</span></a>
    </div>
</div>

<div class="espaco"></div>

<h1 class="selecione">SELECIONE UM FILME</h1>

<select id="select_filme" onchange="mostrar()">
    <option value="">Carregando...</option>
</select>

<div class="resultado">
    <img id="imgFilme">

    <h2 id="tituloFilme"></h2>
    <p id="dataFilme"></p>

    <p id="generoFilme"></p>
    <p id="diretorFilme"></p>
    <p id="elencoFilme"></p>

    <h3>ENREDO</h3>
    <p id="enredoFilme"></p>

    <h3>CURIOSIDADES</h3>
    <p id="curiosidadesFilme"></p>

    <h3>IMPACTO</h3>
    <p id="impactoFilme"></p>

    <h3>FILMES PARECIDOS</h3>
    <p id="parecidosFilme"></p>
</div>


<div class="rodape">
    <h2 class="titulo-rodape">VINTAGE FRIGHTS</h2>

    <p class="frase-rodape">
        ONDE O PASSADO ASSOMBRA O PRESENTE
    </p>

    <div class="info-rodape">
        <p>DIREÇÃO: MARIA CLARA | ANO: 2026</p>
        <p>VINTAGE FRIGHTS © PROJETO INDIVIDUAL SPTECH</p>
    </div>
</div>



<script src="./js/dadosFilmes.js"></script>


<script>

let vetor = [];

function carregar() {

    select_filme.innerHTML = "<option value=''>Escolha um filme</option>";

    for (let i = 0; i < filmes.length; i++) {

        select_filme.innerHTML += 
        "<option value='" + i + "'>" + filmes[i].titulo + "</option>";
    }
}


function mostrar() {

    let ver = select_filme.value;

    if (ver == "") {
        limpar();
        return;
    }

    let filme = filmes[ver];

    imgFilme.src = filme.img;
    tituloFilme.innerHTML = filme.titulo;
    dataFilme.innerHTML = "Ano: " + filme.data;
    generoFilme.innerHTML = "Gênero: " + filme.genero;
    diretorFilme.innerHTML = "Diretor: " + filme.diretor;
    elencoFilme.innerHTML = "Elenco: " + filme.elenco;
    enredoFilme.innerHTML = filme.enredo;
    curiosidadesFilme.innerHTML = filme.curiosidades;
    impactoFilme.innerHTML = filme.impacto;
    parecidosFilme.innerHTML = filme.parecidos;
}


function limpar() {

    imgFilme.src = "";
    tituloFilme.innerHTML = "";
    dataFilme.innerHTML = "";
    generoFilme.innerHTML = "";
    diretorFilme.innerHTML = "";
    elencoFilme.innerHTML = "";
    enredoFilme.innerHTML = "";
    curiosidadesFilme.innerHTML = "";
    impactoFilme.innerHTML = "";
    parecidosFilme.innerHTML = "";
}

</script>
</body>
</html>
