<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vintage Frights | Cadastro</title>

    <script src="./js/sessao.js"></script>

    <link rel="stylesheet" href="css/cadastro.css">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
</head>

<body>

<div class="menu">
    <div class="logo">VINTAGE FRIGHTS</div>

    <div class="botoes">
        <a href="index.html">
        <span>Início</span>
        </a>
        <a href="login.html">
        <span>Login</span>
        </a>
        <a href="cadastro.html">
        <span>Cadastro</span>
        </a>
    </div>
</div>

<div class="login">

    <div class="card">

        <img src="assets/img/logo.png" alt="">

        <div class="campo">
            <span>NOME COMPLETO</span>
            <input id="nome_input" type="text">
        </div>

        <div class="campo">
            <span>E-MAIL</span>
            <input id="email_input" type="text">
        </div>

        <div class="campo">
            <span>SENHA</span>
            <input id="senha_input" type="password">
        </div>

        <button class="botao" onclick="cadastrar()">Cadastrar</button>

        <p class="cadastro">
            JÁ POSSUI CONTA?
            <a href="login.html">
                <span>LOGIN</span>
            </a>
        </p>

    </div>

</div>
<div class="rodape">
    <h2 class="titulo-rodape">VINTAGE FRIGHTS</h2>

    <p class="frase-rodape">
        “O medo nunca envelhece… ele evolui.”
    </p>

    <div class="info-rodape">
        <p>DIREÇÃO: MARIA CLARA | ANO: 2026</p>
        <p>VINTAGE FRIGHTS © PROJETO INDIVIDUAL SPTECH</p>
    </div>
</div>
</body>

<script>
let listaEmpresasCadastradas = [];

function cadastrar() {
    var nome= nome_input.value;
    var email= email_input.value;
    var senha= senha_input.value;

    if (
        nome == "" ||
        email == "" ||
        senha == "" 
    ) {
        alert("Preencha todos os campos");
        return false;
    }


    fetch("http://localhost:3333/usuarios/cadastrar", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
        },
        body: JSON.stringify({
            nomeServer: nome,
            emailServer: email,
            senhaServer: senha
        }),
    })
    .then(function (resposta) {
        if (resposta.ok) {
            alert("Cadastro realizado com sucesso!");
            window.location = "login.html";
        } else {
            throw "Erro ao cadastrar";
        }
    })
    .catch(function (erro) {
        console.log(erro);
    });

    return false;
}


</script>

</html>
